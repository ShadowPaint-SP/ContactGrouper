name: Release APK

on:
  workflow_dispatch:
    inputs:
      promote_previous_prerelease:
        description: Promote the most recent existing prerelease to latest before publishing this prerelease.
        required: true
        type: boolean
        default: true
  push:
    branches:
      - main
    paths:
      - app/build.gradle.kts

permissions:
  contents: write

concurrency:
  group: release-apk-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      PROMOTE_PREVIOUS_PRERELEASE: ${{ github.event_name == 'push' && 'true' || inputs.promote_previous_prerelease }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve release version
        id: version
        run: |
          version_name="$(./gradlew -q :app:printReleaseVersionName)"
          tag_name="v${version_name}"
          echo "version_name=${version_name}" >> "${GITHUB_OUTPUT}"
          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"

      - name: Configure release signing
        id: signing
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          provided=0
          missing=()
          for secret_name in RELEASE_KEYSTORE_BASE64 RELEASE_KEYSTORE_PASSWORD RELEASE_KEY_ALIAS RELEASE_KEY_PASSWORD; do
            secret_value="${!secret_name:-}"
            if [[ -n "${secret_value}" ]]; then
              provided=1
            else
              missing+=("${secret_name}")
            fi
          done

          if [[ "${provided}" -eq 0 ]]; then
            echo "signed=false" >> "${GITHUB_OUTPUT}"
            echo "signing_label=unsigned" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${#missing[@]}" -gt 0 ]]; then
            printf 'Missing required signing secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          keystore_file="${RUNNER_TEMP}/contactgrouper-release.jks"
          printf '%s' "${RELEASE_KEYSTORE_BASE64}" | base64 --decode > "${keystore_file}"
          {
            echo "storeFile=${keystore_file}"
            echo "storePassword=${RELEASE_KEYSTORE_PASSWORD}"
            echo "keyAlias=${RELEASE_KEY_ALIAS}"
            echo "keyPassword=${RELEASE_KEY_PASSWORD}"
          } > keystore.properties

          echo "signed=true" >> "${GITHUB_OUTPUT}"
          echo "signing_label=signed" >> "${GITHUB_OUTPUT}"

      - name: Build release APK
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Package APK asset
        id: package
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          SIGNING_LABEL: ${{ steps.signing.outputs.signing_label }}
        run: |
          set -euo pipefail

          apk_path="$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | sort | head -n 1)"
          if [[ -z "${apk_path}" ]]; then
            echo "No release APK was produced." >&2
            exit 1
          fi

          mkdir -p release
          asset_path="release/contactgrouper-v${VERSION_NAME}-${SIGNING_LABEL}.apk"
          cp "${apk_path}" "${asset_path}"
          echo "asset_path=${asset_path}" >> "${GITHUB_OUTPUT}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: contactgrouper-v${{ steps.version.outputs.version_name }}-${{ steps.signing.outputs.signing_label }}
          path: ${{ steps.package.outputs.asset_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Promote previous prerelease
        if: env.PROMOTE_PREVIOUS_PRERELEASE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_TAG: ${{ steps.version.outputs.tag_name }}
        run: |
          set -euo pipefail

          previous_tag="$(
            gh release list \
              --repo "${GITHUB_REPOSITORY}" \
              --limit 50 \
              --json tagName,isDraft,isPrerelease,createdAt \
            | jq -r --arg current "${CURRENT_TAG}" \
              '[.[] | select(.isDraft == false and .isPrerelease == true and .tagName != $current)]
              | sort_by(.createdAt)
              | reverse
              | .[0].tagName // ""'
          )"

          if [[ -z "${previous_tag}" ]]; then
            echo "No previous prerelease found to promote."
            exit 0
          fi

          gh release edit "${previous_tag}" \
            --repo "${GITHUB_REPOSITORY}" \
            --prerelease=false \
            --latest

      - name: Publish GitHub prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          ASSET_PATH: ${{ steps.package.outputs.asset_path }}
          SIGNED_RELEASE: ${{ steps.signing.outputs.signed }}
          SIGNING_LABEL: ${{ steps.signing.outputs.signing_label }}
        run: |
          set -euo pipefail

          notes_file="${RUNNER_TEMP}/release-notes.md"
          {
            echo "Automated ContactGrouper prerelease for version ${VERSION_NAME}."
            echo
            if [[ "${SIGNED_RELEASE}" == "true" ]]; then
              echo "APK signing: release keystore from GitHub Actions secrets."
            else
              echo "APK signing: unsigned. Configure release signing secrets for installable release APKs."
            fi
          } > "${notes_file}"

          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            is_prerelease="$(
              gh release view "${TAG_NAME}" \
                --repo "${GITHUB_REPOSITORY}" \
                --json isPrerelease \
                --jq '.isPrerelease'
            )"

            if [[ "${is_prerelease}" != "true" ]]; then
              echo "Release ${TAG_NAME} already exists and is not a prerelease." >&2
              exit 1
            fi

            gh release edit "${TAG_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "ContactGrouper ${VERSION_NAME}" \
              --notes-file "${notes_file}" \
              --prerelease \
              --latest=false
          else
            gh release create "${TAG_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "ContactGrouper ${VERSION_NAME}" \
              --notes-file "${notes_file}" \
              --prerelease \
              --latest=false
          fi

          gh release upload "${TAG_NAME}" \
            "${ASSET_PATH}#ContactGrouper ${VERSION_NAME} ${SIGNING_LABEL} APK" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber
