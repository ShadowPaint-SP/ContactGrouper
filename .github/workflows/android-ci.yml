name: Android CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-lint:
    name: Validate workflows
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run actionlint
        uses: docker://rhysd/actionlint:1.7.12

  build:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: platform-tools platforms;android-36 build-tools;36.0.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests, lint, and release APK build
        run: ./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: contactgrouper-release-apk-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 14

  instrumentation-tests:
    name: Instrumentation tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: platform-tools platforms;android-36 build-tools;36.0.0

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumentation tests
        uses: ReactiveCircus/android-emulator-runner@v2.38.0
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          script: ./gradlew :app:connectedDebugAndroidTest --stacktrace
